version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: timetracker-postgres
    environment:
      POSTGRES_DB: timetracker
      POSTGRES_USER: timetracker_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-TimeTracker2024!}
    ports:
      - "5432:5432"
    volumes:
      # Map to local directory for data persistence
      - ./postgres-data:/var/lib/postgresql/data
      - ./Migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetracker_user -d timetracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - timetracker-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timetracker-app
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=timetracker;Username=timetracker_user;Password=${DB_PASSWORD:-TimeTracker2024!}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - timetracker-network

networks:
  timetracker-network:
    driver: bridge
